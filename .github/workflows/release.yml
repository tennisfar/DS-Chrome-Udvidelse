name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract release notes from README
        run: |
          version="${{ steps.version.outputs.version }}"
          escaped=$(echo "$version" | sed 's/\./\\./g')
          notes=$(awk "/^### Version ${escaped}$/{found=1; next} found && /^### Version /{exit} found{print}" README.md | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
          {
            echo "$notes"
            echo ""
            echo "## Installation"
            echo ""
            echo "1. Download **ds-chrome-extension.zip** fra Assets herunder."
            echo "2. Pak zip-filen ud til en mappe på din computer."
            echo '3. Åbn `chrome://extensions/` — eller klik på de tre prikker øverst til højre i Chrome → "Extensions" → "Manage Extensions".'
            echo '4. Slå "Developer mode" til (øverst til højre).'
            echo '5. Vælg "Load unpacked".'
            echo "6. Peg på den udpakkede mappe."
            echo '7. Udvidelsen er nu aktiv — klik på puslespilsikonet øverst til højre i Chrome, find "DS Chrome Udvidelse" på listen, og klik på nåleikonet ud for den for at pinne den til værktøjslinjen.'
          } > release_body.md

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package dist as zip
        run: zip -r ds-chrome-extension.zip manifest.json dist/ assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_body.md
          files: ds-chrome-extension.zip
