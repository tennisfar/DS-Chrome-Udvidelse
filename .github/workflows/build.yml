name: Build Extension

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Zip extension
        if: startsWith(github.ref, 'refs/tags/')
        run: zip -r ds-chrome-extension.zip dist/ manifest.json assets/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release create ${{ github.ref_name }} ds-chrome-extension.zip --title "Release ${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
